name: 'Terraform Azure CI/CD'

on:
  push:
    branches:
      - main

# ARM Secrets ------------------------------------------
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}


jobs:

  # 1 - Checokv
  Security:
    name: 'Terraform deployment'
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: true # Workflow will pass, even with chekov problems


  
  validate:
    name: 'Terraform validate'
    runs-on: ubuntu-latest
    needs: Security
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

    
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

   
      - name: Terraform Init
        run: terraform init

    
      - name: Terraform validate
        run: terraform validate

    
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform init
        runs: terraform init

      - name: Terraform plan
        runs: terraform plan


  apply:
    name: 'Terraform apply'
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        runs: terraform init

      - name: Terraform plan
        runs: terraform plan
    
      - name: Terraform apply
        runs: terraform apply



      