name: 'Terraform Azure CI/CD'

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: 'Terraform Deployment'
    runs-on: ubuntu-latest
    # ARM Secrets ------------------------------------------
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
    # 1 - Taking code from repository to a robot
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2 - Instalattion and configuration robot
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 3 - Initialization Terraform 
    - name: Terraform Init
      run: terraform init

    # 4 - Generating a change plan
    - name: Terraform Plan
      run: terraform plan -input=false

    # 5 - Apply and push
    - name: Terraform Apply
      if: github.event_name == 'push'
      run: terraform apply -auto-approve -input=false
    
    # 6 - Checokv
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Run Checkov Security Scan
      uses: bridgecrewio/checkov-action@master
      with:
        framework: terraform
        output_format: cli
        soft_fail: true # Workflow will pass, even with chekov problems


      